version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow_password
      POSTGRES_DB: taskflow_db
    ports:
      - "5433:5432"
    volumes:
      - taskflow_db_data:/var/lib/postgresql/data

volumes:
  taskflow_db_data:
